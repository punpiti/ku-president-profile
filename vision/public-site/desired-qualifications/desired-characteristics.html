<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลักษณะพึงประสงค์ของอธิการบดี มก.</title>
  <style>
    :root {
      --ink: #17211c;
      --muted: #657068;
      --line: #dfe6df;
      --bg: #f6f7f3;
      --panel: #ffffff;
      --green: #2f7d52;
      --teal: #24747b;
      --gold: #b98724;
      --red: #a84d3d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.58;
    }

    a { color: inherit; }

    .wrap {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .navlink {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      text-decoration: none;
      background: #fff;
      white-space: nowrap;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, .75fr);
      gap: 28px;
      padding: 24px 0 30px;
      align-items: end;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 3vw, 3.05rem);
      line-height: 1.14;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .basis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .basis div, .panel, .category-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .basis div {
      padding: 13px;
      min-height: 76px;
    }

    .label {
      color: var(--muted);
      font-size: .84rem;
    }

    .value {
      margin-top: 5px;
      font-weight: 780;
      font-size: 1.45rem;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    main {
      padding: 22px 0 40px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(260px, .55fr) minmax(0, 1.45fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      padding: 18px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.08rem;
      letter-spacing: 0;
    }

    .nonnegotiables {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .nonnegotiables li {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 9px;
      align-items: start;
      color: var(--ink);
    }

    .nonnegotiables a {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 9px;
      text-decoration: none;
    }

    .mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e7f1ea;
      color: var(--green);
      display: inline-grid;
      place-items: center;
      font-weight: 760;
    }

    .categories {
      display: grid;
      gap: 16px;
    }

    .category-card {
      padding: 18px;
    }

    .category-head {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 13px;
      align-items: start;
      margin-bottom: 10px;
    }

    .rank {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1.15rem;
      font-variant-numeric: tabular-nums;
    }

    .category-card:nth-child(2n) .rank { background: var(--teal); }
    .category-card:nth-child(3n) .rank { background: var(--gold); }
    .category-card:nth-child(5n) .rank { background: var(--red); }

    h3 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: 0;
    }

    .short {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .block {
      margin-top: 14px;
      padding-top: 13px;
      border-top: 1px solid var(--line);
    }

    .block-title {
      margin: 0 0 8px;
      color: var(--ink);
      font-weight: 760;
      font-size: .95rem;
    }

    .trait-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding-left: 1.15rem;
      color: var(--ink);
    }

    .signals {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 12px 0;
    }

    .chip {
      border: 1px solid var(--line);
      background: #f8faf7;
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--muted);
      font-size: .84rem;
    }

    .evidence {
      display: grid;
      gap: 7px;
      margin: 10px 0 0;
      padding-left: 1.15rem;
      color: var(--muted);
    }

    .sections {
      margin-top: 10px;
      color: var(--muted);
      font-size: .88rem;
    }

    .core-list {
      display: grid;
      gap: 9px;
      margin: 16px 0 0;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .core-item {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 9px;
      color: var(--muted);
      font-size: .9rem;
    }

    footer {
      padding: 0 0 34px;
      color: var(--muted);
      font-size: .9rem;
    }

    @media (max-width: 900px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .basis { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .wrap { width: min(100% - 20px, 1160px); }
      .topbar { align-items: flex-start; flex-direction: column; }
      .basis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .category-head { grid-template-columns: 40px 1fr; }
      .rank { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <span>สกัดจากข้อเสนอแนะใน PDF</span>
      <div>
        <a class="navlink" href="../index.html">หน้าแรก</a>
        <a class="navlink" href="index.html">กลับไปหน้าภาพรวม</a>
        <a class="navlink" href="categories/administration.html">รายงานรายหมวด</a>
      </div>
    </div>
    <div class="wrap hero">
      <div>
        <h1 id="title">ลักษณะพึงประสงค์ของอธิการบดี</h1>
        <p class="lead" id="summary"></p>
      </div>
      <div class="basis" id="basis"></div>
    </div>
  </header>

  <main class="wrap layout">
    <aside class="panel">
      <h2>แกนที่ไม่ควรต่อรอง</h2>
      <ul class="nonnegotiables" id="nonnegotiables"></ul>
    </aside>
    <section class="categories" id="categories"></section>
  </main>

  <footer class="wrap">
    หน้านี้เป็นการสังเคราะห์จากรายการข้อเสนอแนะ ไม่ใช่การคัดลอกทุกข้อความจาก PDF โดยตรง
  </footer>

  <script>
    const fmt = new Intl.NumberFormat("th-TH");

    function basisCard(label, value) {
      return `<div><span class="label">${label}</span><div class="value">${fmt.format(value)}</div></div>`;
    }

    function categoryCard(item) {
      return `
        <article class="category-card" id="category-${item.number}">
          <div class="category-head">
            <div class="rank">${item.number}</div>
            <div>
              <h3>${item.category}</h3>
              <p class="short">${item.issue_focus}</p>
            </div>
          </div>
          <div class="block">
            <div class="block-title">ลักษณะพึงประสงค์ของอธิการบดีในประเด็นนี้</div>
            <p class="short">${item.desired_profile}</p>
            <ol class="trait-list">
              ${item.desired_traits.map(text => `<li>${text}</li>`).join("")}
            </ol>
          </div>
          <div class="signals">
            ${item.keywords.map(keyword => `<span class="chip">${keyword}</span>`).join("")}
          </div>
          <div class="block">
            <div class="block-title">ฐานจากคำตอบ</div>
            <ul class="evidence">
              ${item.evidence.map(text => `<li>${text}</li>`).join("")}
            </ul>
          </div>
        </article>
      `;
    }

    function coreItem(item) {
      return `
        <div class="core-item">
          <span class="mark">${item.rank}</span>
          <span>${item.name}</span>
        </div>
      `;
    }

    function navItem(item) {
      return `
        <li>
          <a href="#category-${item.number}">
            <span class="mark">${item.number}</span>
            <span>${item.category}</span>
          </a>
        </li>
      `;
    }

    function categoryNav(categories) {
      return `
        <h2>หมวดประเด็น</h2>
        <ul class="nonnegotiables">
          ${categories.map(navItem).join("")}
        </ul>
      `;
    }

    function nonNegotiables(data) {
      return `
        <div class="core-list">
          <h2>แกนร่วมที่พบข้ามหมวด</h2>
          ${data.core_characteristics.slice(0, 5).map(coreItem).join("")}
        </div>
      `;
    }

    function sidebar(data) {
      return `
        ${categoryNav(data.category_analysis)}
        <div class="core-list">
          <h2>แกนที่ไม่ควรต่อรอง</h2>
          <ul class="nonnegotiables">
            ${data.non_negotiables.map((text, index) => `
              <li><span class="mark">${index + 1}</span><span>${text}</span></li>
            `).join("")}
          </ul>
        </div>
        ${nonNegotiables(data)}
      `;
    }

    async function main() {
      const data = await fetch("data/desired_characteristics.json").then(response => response.json());
      document.title = data.title;
      document.querySelector("#title").textContent = data.title;
      document.querySelector("#summary").textContent = data.profile_summary;

      document.querySelector("#basis").innerHTML = [
        basisCard("ผู้ตอบ", data.basis.respondents),
        basisCard("หัวข้อหลัก", data.basis.sections),
        basisCard("รายการที่แยกได้", data.basis.numbered_items),
        basisCard("รายการถ่วงน้ำหนัก", data.basis.weighted_items)
      ].join("");

      document.querySelector("aside.panel").innerHTML = sidebar(data);

      document.querySelector("#categories").innerHTML = data.category_analysis.map(categoryCard).join("");
    }

    main().catch(error => {
      document.body.innerHTML = `<main class="wrap"><div class="panel"><h1>โหลดข้อมูลไม่สำเร็จ</h1><p>${error.message}</p></div></main>`;
    });
  </script>
  <script src="../assets/site-analytics.js" defer></script>
</body>
</html>
